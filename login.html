<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acesso Especial ♡</title>
  <meta name="description" content="Acesso especial — só pra você entrar, meu amor." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>

<!-- Pétalas animadas -->
<canvas id="pw-petals" aria-hidden="true"></canvas>

<!-- Card de login -->
<div class="login-card" role="main">
  <span class="login-icon" aria-hidden="true">🌸</span>
  <p class="login-eyebrow">✦ acesso especial ✦</p>
  <h1 class="login-title">Só pra você entrar,<br/><em>meu amor</em></h1>
  <p class="login-hint">Pensa bem... que frase resume tudo que sinto por você?</p>

  <div class="input-wrap">
    <input
      type="password"
      id="pw-input"
      class="pw-input"
      placeholder="Digite a senha com carinho..."
      autocomplete="off"
      aria-label="Senha de acesso"
    />
    <button class="pw-toggle" id="pw-toggle" type="button" aria-label="Mostrar senha">👁️</button>
  </div>

  <p class="pw-error" id="pw-error" aria-live="polite"></p>
  <p class="pw-attempts" id="pw-attempts"></p>

  <button class="pw-btn" id="pw-submit" type="button">Entrar ♡</button>

  <div class="login-ornament">feito com todo amor do mundo</div>
</div>

<!-- Overlay de sucesso -->
<div class="success-overlay" id="success-overlay" aria-live="assertive">
  <span class="success-icon">💚</span>
  <p class="success-text">Bem-vinda, meu amor!</p>
  <p class="success-sub">Preparando o site especial para você... 🌸</p>
</div>

<script>
'use strict';

const PASSWORD = 'eu te amo formiguinha';

/* ─── PÉTALAS ──────────────────────────────────────────────── */
(function initPetals() {
  const canvas = document.getElementById('pw-petals');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const petals = Array.from({ length: 22 }, () => ({
    x:        Math.random() * window.innerWidth,
    y:        Math.random() * window.innerHeight - window.innerHeight,
    r:        Math.random() * 8 + 4,
    drift:    (Math.random() - .5) * .6,
    speed:    Math.random() * .6 + .3,
    rot:      Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - .5) * .04,
    alpha:    Math.random() * .4 + .25,
    color:    Math.random() > .5 ? '#f2d7d5' : '#b8e0cc',
  }));

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    petals.forEach(p => {
      p.y    += p.speed;
      p.x    += p.drift + Math.sin(p.y / 60) * .3;
      p.rot  += p.rotSpeed;
      if (p.y > canvas.height + 20) { p.y = -20; p.x = Math.random() * canvas.width; }
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(0, 0, p.r, p.r * 1.6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ─── LOGIN ─────────────────────────────────────────────────── */
(function initLogin() {
  if (sessionStorage.getItem('auth_ok') === '1') {
    window.location.replace('index.html');
    return;
  }

  const input      = document.getElementById('pw-input');
  const submit     = document.getElementById('pw-submit');
  const toggle     = document.getElementById('pw-toggle');
  const errorEl    = document.getElementById('pw-error');
  const attemptsEl = document.getElementById('pw-attempts');
  const overlay    = document.getElementById('success-overlay');

  let attempts = 0;
  const MAX    = 5;
  let locked   = false;

  toggle.addEventListener('click', () => {
    input.type = input.type === 'password' ? 'text' : 'password';
    toggle.textContent = input.type === 'password' ? '👁️' : '🙈';
  });

  function attempt() {
    if (locked) return;
    const val = input.value.trim().toLowerCase();
    if (!val) { input.focus(); return; }

    if (val === PASSWORD) {
      sessionStorage.setItem('auth_ok', '1');
      errorEl.textContent    = '';
      attemptsEl.textContent = '';
      submit.disabled = true;
      input.disabled  = true;
      overlay.classList.add('show');
      setTimeout(() => window.location.replace('index.html'), 1800);

    } else {
      attempts++;
      input.value = '';
      input.classList.add('shake');
      setTimeout(() => input.classList.remove('shake'), 450);

      const remaining = MAX - attempts;

      if (remaining <= 0) {
        locked = true;
        errorEl.textContent    = '💔 Pensa com calma... você sabe!';
        errorEl.className      = 'pw-error';
        attemptsEl.textContent = 'Aguarde 10 segundos para tentar de novo.';
        submit.disabled = true;
        input.disabled  = true;

        let secs = 10;
        const interval = setInterval(() => {
          secs--;
          attemptsEl.textContent = `Tente novamente em ${secs}s...`;
          if (secs <= 0) {
            clearInterval(interval);
            locked = false;
            attempts = 0;
            submit.disabled = false;
            input.disabled  = false;
            errorEl.textContent    = '';
            attemptsEl.textContent = '';
            input.focus();
          }
        }, 1000);

      } else {
        errorEl.textContent    = '❌ Não é bem isso... pensa mais!';
        errorEl.className      = 'pw-error';
        attemptsEl.textContent = `${remaining} tentativa${remaining === 1 ? '' : 's'} restante${remaining === 1 ? '' : 's'}`;
      }
    }
  }

  submit.addEventListener('click', attempt);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });
  input.focus();
})();
</script>
</body>
</html>
